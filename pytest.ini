[pytest]
# pytest配置文件

# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=60

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    security: 安全测试
    slow: 慢速测试（需要网络或大量资源）

# 覆盖率配置
[coverage:run]
source = .
omit =
    tests/*
    venv/*
    */site-packages/*
    setup.py
    build_exe.py
    quickstart.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
