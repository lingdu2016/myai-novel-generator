name: 功能请求
description: 建议新的功能或改进现有功能
title: "[功能请求] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您为 AI 小说生成工具提出功能建议！为了帮助我们更好地评估您的请求，请填写以下信息。

  - type: textarea
    id: feature-description
    attributes:
      label: 功能描述
      description: 请详细描述您希望实现的功能
      placeholder: |
        请清晰地描述您希望添加的功能，包括：
        - 功能的主要目的
        - 功能的具体表现
        - 这个功能将如何改善用户体验
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述这个功能的使用场景和用户需求
      placeholder: |
        例如：
        - 当我想要 [完成某个任务] 时
        - 在 [特定情况] 下
        - 为了 [达到某个目标]
        - 我希望能够 [使用这个功能]
    validations:
      required: true

  - type: textarea
    id: expected-implementation
    attributes:
      label: 期望实现方式
      description: 描述您期望这个功能如何实现
      placeholder: |
        请描述您期望的实现方式，包括：
        - 界面布局建议
        - 交互流程设计
        - 配置选项
        - 输出格式等
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 如果您有其他解决方案，请在此描述
      placeholder: |
        例如：
        - 是否有现有的工作方式可以替代？
        - 是否有其他类似工具实现了类似功能？
        - 是否可以通过配置调整来满足需求？
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级评估
      description: 请评估此功能的重要性和紧急程度
      options:
        - 低 - 可选功能，不影响核心使用
        - 中 - 有用功能，可以提升用户体验
        - 高 - 重要功能，对核心功能有显著改善
        - 紧急 - 关键功能，影响正常使用
      default: 0

  - type: textarea
    id: target-users
    attributes:
      label: 目标用户群体
      description: 这个功能主要服务于哪些用户
      placeholder: |
        例如：
        - 新手用户
        - 专业作家
        - 批量生成用户
        - 特定类型小说创作者
    validations:
      required: true

  - type: checkboxes
    id: impact-assessment
    attributes:
      label: 影响评估
      description: 请评估此功能可能的影响
      options:
        - label: 此功能可能影响现有工作流程
          required: false
        - label: 此功能需要额外的配置选项
          required: false
        - label: 此功能可能需要API密钥或其他外部资源
          required: false

  - type: textarea
    id: additional-info
    attributes:
      label: 附加信息
      description: 任何其他有助于评估此功能的信息
      placeholder: |
        例如：
        - 参考的其他工具或功能
        - 相关的讨论链接
        - 用户反馈
        - 市场调研结果

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      description: 您是否愿意参与此功能的开发
      options:
        - label: 我愿意为此功能贡献代码
          required: false
        - label: 我愿意为此功能进行测试
          required: false
        - label: 我愿意为此功能编写文档
          required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      description: 请确认以下事项
      options:
        - label: 我已经搜索了现有的功能请求，确认这是一个新的请求
          required: true
        - label: 我已经阅读了项目的贡献指南
          required: true
        - label: 我理解这可能需要时间来评估和实现
          required: true